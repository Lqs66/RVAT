syntax = "proto3";

package modelInputs;

enum TypeSpec {
  UNKNOWN = 0;
  INT = 1; // iN
  FLOAT = 2;
  DOUBLE = 3;
  PTR = 4;
  AGGR = 5;
}

message Member {
  uint32 member_offset = 1;
  TypeSpec type = 2;
  uint32 size = 3;
  oneof data {
    sint64 i64_value = 4;
    float f_value = 5;
    double d_value = 6;
  }
}

message MemberList {
  repeated Member members = 1;
}

message GlobalVar {
  uint32 offset = 1;
  string name = 2;
  TypeSpec type = 3;
  uint32 size = 4;
  uint64 addr = 5;
  oneof data {
    sint64 i64_value = 6;
    float f_value = 7;
    double d_value = 8;
    MemberList members = 9;
  }
}

message HeapVar {
  uint64 hash = 1;
  uint32 offset = 2;
  TypeSpec type = 3;
  uint32 size = 4;
  uint64 addr = 5;
  oneof data {
    sint64 i64_value = 6;
    float f_value = 7;
    double d_value = 8;
    MemberList members = 9;
  }
}

message ModelInputs {
  repeated GlobalVar globalVars = 1;
  repeated HeapVar heapVars = 2;
}